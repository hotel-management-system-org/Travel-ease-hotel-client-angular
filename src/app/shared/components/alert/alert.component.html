

<!-- ERROR ALERT (Error message) -->
<div class="alert alert--error" role="alert">
  <span class="alert__icon">⚠</span>
  <span class="alert__message">Invalid email or password. Please try again.</span>
</div>

<!-- SUCCESS ALERT (Success message) -->
<div class="alert alert--success" role="alert">
  <span class="alert__icon">✓</span>
  <span class="alert__message">Check your email — We've sent a 6-digit reset code to your inbox.</span>
</div>

<!-- INFO ALERT -->
<div class="alert alert--info" role="alert">
  <span class="alert__icon">ℹ</span>
  <span class="alert__message">Please verify your email to continue.</span>
</div>

<!-- WARNING ALERT -->
<div class="alert alert--warning" role="alert">
  <span class="alert__icon">⚠</span>
  <span class="alert__message">Your session will expire in 5 minutes.</span>
</div>

<!-- PASSWORD CHANGED SUCCESS BANNER -->
<div class="alert alert--success alert--banner" role="alert">
  <span class="alert__icon">✓</span>
  <div class="alert__content">
    <span class="alert__title">Password changed successfully</span>
    <span class="alert__subtitle">You can now use your new password to log in to the dashboard.</span>
  </div>
</div>
