<section class="newsletter">
  <span class="newsletter__tag">Subscribe</span>

  <h2 class="newsletter__title">Get Special Offers</h2>
  <p class="newsletter__desc">
    Join our newsletter to receive weekly travel inspiration and exclusive member-only discounts.
  </p>

  <div class="newsletter__form">
    <div class="newsletter__input-wrap">
      <svg class="newsletter__input-icon"
           width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <input
        class="newsletter__input"
        type="email"
        placeholder="Your email address"
        aria-label="Email address for newsletter"
      />
    </div>
    <button class="newsletter__btn" type="button">
      Subscribe Now
    </button>
  </div>

</section>
