<div class="gallery-section">
  <div class="gallery-section__topbar">
    <div class="gallery-section__topbar-left">
      <div class="gallery-section__hotel-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="gallery-section__hotel-name">{{hotel?.hotelName}}</span>
    </div>

    <div class="gallery-section__topbar-right">
      <button class="gallery-section__icon-btn" aria-label="Share">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="gallery-section__icon-btn" aria-label="Save to wishlist">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                   a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23
                   l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <button class="gallery-section__book-btn" type="button">
        Book Now
      </button>
    </div>
  </div>
  <div class="gallery-grid">
    <div class="gallery-grid__main">
      <img
        class="gallery-grid__img"
        src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800&q=80"
        alt="Grand Plaza Resort - Lobby"
      />
    </div>
    <div class="gallery-grid__side">

      <div class="gallery-grid__thumb">
        <img
          class="gallery-grid__img"
          src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400&q=80"
          alt="Ocean View"
        />
      </div>

      <div class="gallery-grid__thumb">
        <img
          class="gallery-grid__img"
          src="https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=400&q=80"
          alt="Swimming Pool"
        />
      </div>

      <div class="gallery-grid__thumb">
        <img
          class="gallery-grid__img"
          src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&q=80"
          alt="Luxury Room"
        />
      </div>

      <div class="gallery-grid__thumb gallery-grid__thumb--more">
        <img
          class="gallery-grid__img"
          src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&q=80"
          alt="Restaurant"
        />
        <div class="gallery-grid__overlay">
          <span>+12 Photos</span>
        </div>
      </div>
    </div>
  </div>
</div>
