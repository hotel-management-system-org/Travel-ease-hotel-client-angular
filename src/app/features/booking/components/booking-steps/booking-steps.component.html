
<div class="booking-steps" style="padding: 20px">
  <div class="booking-steps__step booking-steps__step--done">
    <div class="booking-steps__circle booking-steps__circle--done">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="3"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <span class="booking-steps__label">Your selection</span>
  </div>
  <div class="booking-steps__line booking-steps__line--done"></div>
  <div class="booking-steps__step booking-steps__step--active">
    <div class="booking-steps__circle booking-steps__circle--active">
      <span>2</span>
    </div>
    <span class="booking-steps__label booking-steps__label--active">Your details</span>
  </div>

  <div class="booking-steps__line"></div>
  <div class="booking-steps__step">
    <div class="booking-steps__circle">
      <span>3</span>
    </div>
    <span class="booking-steps__label">Finish booking</span>
  </div>

</div>
