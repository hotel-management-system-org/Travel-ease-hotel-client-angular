<div class="auth-page">

  <div class="auth-page__bg-pattern" aria-hidden="true"></div>

  <div class="register-card">

    <div class="register-card__body">

      <div class="register-card__header">
        <h1 class="register-card__title" >Sign in or create an account</h1>
        <p class="register-card__desc">Join Travel Ease to manage your hotel stays and experience seamless luxury.</p>
      </div>

      <form class="auth-form" novalidate [formGroup]="form" (ngSubmit)="register()" >
        <div class="form-row">
          <div class="form-field">
            <label class="form-field__label" for="reg-fname">First Name</label>
            <input
              class="form-field__input"
              type="text"
              id="reg-fname"
              placeholder="John"
              autocomplete="given-name"
              formControlName="firstName"
            />
          </div>
          <div class="form-field">
            <label class="form-field__label" for="reg-lname">Last Name</label>
            <input
              class="form-field__input"
              type="text"
              id="reg-lname"
              placeholder="Doe"
              autocomplete="family-name"
              formControlName="lastName"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-field__label" for="reg-email">Email Address</label>
            <input
              class="form-field__input"
              type="email"
              id="reg-email"
              placeholder="john.doe@example.com"
              autocomplete="email"
              formControlName="email"
            />
          </div>
          <div class="form-field">
            <label class="form-field__label" for="reg-phone">Contact Number</label>
            <input
              class="form-field__input"
              type="tel"
              id="reg-phone"
              placeholder="+1 (555) 000-0000"
              autocomplete="tel"
              formControlName="contact"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field pass-field">
            <label class="form-field__label" for="reg-pass">Password</label>
            <div class="form-field__icon-wrapper">
              <input
                class="form-field__input form-field__input--with-toggle "
                type="password"
                id="reg-pass"
                placeholder="••••••••"
                autocomplete="new-password"
                formControlName="password"
              />
              <button class="form-field__toggle-btn" type="button" aria-label="Show password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="password-strength">
              <div class="password-strength__bar">
                <div class="password-strength__fill password-strength__fill--medium"></div>
              </div>
              <span class="password-strength__label password-strength__label--medium">Medium</span>
            </div>
          </div>

          <div class="form-field pass-field">
            <label class="form-field__label" for="reg-confirm">Confirm Password</label>
            <div class="form-field__icon-wrapper">
              <input
                class="form-field__input form-field__input--with-toggle"
                type="password"
                id="reg-confirm"
                placeholder="••••••••"
                autocomplete="new-password"
              />
              <button class="form-field__toggle-btn" type="button" aria-label="Show password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="form-field">
          <label class="checkbox-label">
            <input type="checkbox" class="checkbox-label__input" />
            <span class="checkbox-label__custom"></span>
            <span class="checkbox-label__text">
              I agree to the
              <a href="#">Terms of Service</a>
              and
              <a href="#">Privacy Policy</a>.
            </span>
          </label>
        </div>

        <button class="btn reg-btn " type="submit">
          Register Now &nbsp;→
        </button>
       <div style="display: flex; justify-content: center; align-items: center">
        <div class="social-row" style="display: flex; width: 100px; ">
          <button class="btn btn-social btn&#45;&#45;social" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </button>

          <button class="btn btn-social btn&#45;&#45;social btn&#45;&#45;social&#45;&#45;facebook" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </button>
        </div>
         </div>

      </form>
      <p class="auth-card__footer-text">
        Already have an account?
        <a href="/auth/login" class="auth-card__link">Login here</a>
      </p>
    </div>
  </div>
</div>>
