
<div class="auth-page">
  <div class="forgot-card">

    <h1 class="forgot-card__title">Forgot Password?</h1>
    <p class="forgot-card__desc">
      No worries! Enter your email address below and we'll send you a recovery link.
    </p>

    <!-- FORM -->
    <form class="auth-form" novalidate>
      <div class="form-field">
        <label class="form-field__label" for="forgot-email">Email Address</label>
        <div class="form-field__icon-wrapper">
          <svg class="form-field__svg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            class="form-field__input form-field__input--with-icon"
            type="email"
            id="forgot-email"
            placeholder="name@company.com"
            autocomplete="email"
          />
        </div>
      </div>

      <button class="btn btn--primary btn--full" type="submit">
        Send Reset Code &nbsp;→
      </button>
    </form>

    <a href="/auth/login" class="forgot-card__back-link">
      ← Back to Login
    </a>

  </div>

  <p class="auth-page__footer">© 2026 Travel Ease Hotel System. All rights reserved.</p>

</div>
